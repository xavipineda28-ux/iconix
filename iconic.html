<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iconix - Tienda Digital</title>

    <style>
        body {
            background-color: #F5F5DC;
            margin: 0;
            padding: 40px 20px;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
        }

        .titulo {
            color: #ff1493;
            text-align: center;
            font-size: 4rem;
            font-family: 'Times New Roman', Times, serif;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 4px;
        }

        .subtitulo {
            color: #c71585;
            text-align: center;
            font-size: 1.8rem;
            font-style: italic;
            font-family: 'Times New Roman', Times, serif;
        }

        .productos {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        figure {
            text-align: center;
        }

        figure img {
            width: 200px;
            border-radius: 15px;
        }

        figcaption {
            margin-top: 10px;
            font-size: 1.3rem;
            color: #c71585;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .titulo { font-size: 2.5rem; }
            .subtitulo { font-size: 1.3rem; }
        }
    </style>
</head>

<body>

<header>
    <h1 class="titulo">ICONIX</h1>
    <h2 class="subtitulo">Catálogo Digital</h2>
</header>

<div class="productos">


    <figure>
        <img src="lavanda.png" alt="">
        <figcaption>Valor: C$70.00</figcaption>
    </figure>

    <figure>
        <img src="lazo-final.png" alt="">
        <figcaption>Valor: C$70.00</figcaption>
    </figure>

    <figure>
        <img src="‎colasventa.png‎" alt="">
        <figcaption>Valor: C$40.00</figcaption>
    </figure>

</div>

</body>
</html>
